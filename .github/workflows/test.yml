name: test

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/test-rust.yml"
      - "**/src/**"
      - "**/tests/**"
      - "**/Cargo.toml"
      - "**/build.rs"
      - "**/examples/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/test-rust.yml"
      - "src/**"
      - "Cargo.toml"
      - "build.rs"
      - "tests/**"
      - "examples/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}${{ github.ref == 'refs/heads/main' && format('-{0}', github.sha) || '' }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64]
      fail-fast: false

    steps:
      - name: Windows runner hack
        shell: cmd
        run: |
            dir d:\a
            cd ..
            mkdir C:\MaaFramework
            rmdir MaaFramework
            mklink /j MaaFramework C:\MaaFramework
            dism /Online /Disable-Feature /FeatureName:Windows-Defender /Remove /NoRestart /Quiet
            cd .
      - name: Windows runner hack (2)
        uses: al-cheb/configure-pagefile-action@v1.4
        with:
            minimum-size: 16GB
            maximum-size: 16GB
            disk-root: "D:"

      - name: Checkout self
        uses: actions/checkout@v4
        with:
            path: maa-framework-rs

      - name: Checkout MaaFramework
        uses: actions/checkout@v4
        with:
            repository: MaaXYZ/MaaFramework
            submodules: recursive
            path: MaaFramework

      - name: Setup Windows 10 SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2.2
        with:
            sdk-version: 26100

      - name: Setup Python
        uses: actions/setup-python@v5.2.0
        with:
            python-version: "3.9"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
            toolchain: stable
            target: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: choco install llvm -y

      - name: Get latest MaaFramework release tag
        id: maa-version
        shell: bash
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
            MAA_TAG=$(gh release list --repo MaaXYZ/MaaFramework \
              --exclude-drafts \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')
            echo "tag=$MAA_TAG" >> $GITHUB_OUTPUT
            echo "Using MaaFramework $MAA_TAG"

      - name: Download MaaFramework SDK from release
        shell: pwsh
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
            $tag = "${{ steps.maa-version.outputs.tag }}"
            New-Item -ItemType Directory -Force -Path asset, sdk, install | Out-Null

            $assetName = gh release view $tag --repo MaaXYZ/MaaFramework --json assets --jq '.assets[].name | select(((ascii_downcase | contains("win")) or (ascii_downcase | contains("windows"))) and ((ascii_downcase | contains("x64")) or (ascii_downcase | contains("x86_64"))))' | Select-Object -First 1
            if (-not $assetName) { throw "No windows x64 asset found for $tag" }

            gh release download $tag --repo MaaXYZ/MaaFramework --pattern $assetName --dir asset

            $file = Get-ChildItem asset -File | Select-Object -First 1
            if (-not $file) { throw "Downloaded asset not found" }

            if ($file.Extension -eq ".zip") {
              Expand-Archive $file.FullName -DestinationPath sdk -Force
            } else {
              tar -xf $file.FullName -C sdk
            }

            $root = Get-ChildItem sdk -Directory | Select-Object -First 1
            if ($root) {
              Copy-Item "$($root.FullName)\*" install -Recurse -Force
            } else {
              Copy-Item "sdk\*" install -Recurse -Force
            }

      - name: Download Plugin
        uses: robinraju/release-downloader@v1
        with:
            repository: MaaXYZ/MaaPluginDemo
            latest: true
            fileName: "*win-${{ matrix.arch }}*"
            out-file-path: "download_plugins"
            extract: true
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Plugin
        shell: bash
        run: |
            cp -r download_plugins/bin install/bin/plugins

      - name: Run Rust testing
        shell: bash
        run: |
            # Move out of maa-framework-rs because we checked it out via path: maa-framework-rs
            # Actually, to run cargo test, we need to be IN maa-framework-rs
            # But earlier I said "Checkout self path: maa-framework-rs".
            # The structure is:
            # D:\a\maa-framework-rs\maa-framework-rs (repo content)
            # D:\a\maa-framework-rs\MaaFramework    (core content)
            # D:\a\maa-framework-rs\install         (installed libs)
            # D:\a\maa-framework-rs\download_plugins
            
            # Setup paths for tests
            export MAA_SDK_PATH=$(pwd)/install
            export MAA_TEST_RESOURCES_DIR=$(pwd)/MaaFramework/test/TestingDataSet/PipelineSmoking
            
            # Debug: show structure
            ls -R install || true
            
            cd maa-framework-rs
            cargo test --verbose -- --test-threads=1
            cargo test --verbose --features dynamic -- --test-threads=1

  ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64]
      fail-fast: false

    steps:
      - name: Install dep
        run: |
            sudo apt-get update -y
            sudo apt-get install -y ninja-build cmake ccache libclang-dev

      - name: Checkout self
        uses: actions/checkout@v4
        with:
            path: maa-framework-rs

      - name: Checkout MaaFramework
        uses: actions/checkout@v4
        with:
            repository: MaaXYZ/MaaFramework
            submodules: recursive
            path: MaaFramework

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
            remove_stale_cache: false

      - name: Setup Python
        uses: actions/setup-python@v5.2.0
        with:
            python-version: "3.9"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
            toolchain: stable

      - name: Get latest MaaFramework release tag
        id: maa-version
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
            MAA_TAG=$(gh release list --repo MaaXYZ/MaaFramework \
              --exclude-drafts \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')
            echo "tag=$MAA_TAG" >> $GITHUB_OUTPUT
            echo "Using MaaFramework $MAA_TAG"

      - name: Download MaaFramework SDK from release
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
            TAG="${{ steps.maa-version.outputs.tag }}"
            mkdir -p asset sdk install

            ASSET_NAME=$(gh release view "$TAG" --repo MaaXYZ/MaaFramework --json assets \
              --jq '.assets[].name | select((ascii_downcase | contains("linux")) and ((ascii_downcase | contains("x64")) or (ascii_downcase | contains("x86_64"))))' \
              | head -n 1)

            test -n "$ASSET_NAME" || (echo "No linux x64 asset found for $TAG" && exit 1)

            gh release download "$TAG" --repo MaaXYZ/MaaFramework --pattern "$ASSET_NAME" --dir asset

            FILE=$(find asset -type f | head -n 1)
            case "$FILE" in
              *.zip) unzip -q "$FILE" -d sdk ;;
              *.tar.gz|*.tgz) tar -xzf "$FILE" -C sdk ;;
              *.tar.xz) tar -xJf "$FILE" -C sdk ;;
              *) echo "Unsupported asset: $FILE"; exit 1 ;;
            esac

            ROOT=$(find sdk -mindepth 1 -maxdepth 1 -type d | head -n 1)
            [ -n "$ROOT" ] || ROOT=sdk
            cp -R "$ROOT"/. install/

      - name: Download Plugin
        uses: robinraju/release-downloader@v1
        with:
            repository: MaaXYZ/MaaPluginDemo
            latest: true
            fileName: "*linux-${{ matrix.arch }}*"
            out-file-path: "download_plugins"
            extract: true
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Plugin
        shell: bash
        run: |
            cp -r download_plugins/bin install/bin/plugins

      - name: Run Rust testing
        shell: bash
        run: |
            export MAA_SDK_PATH=$(pwd)/install
            export MAA_TEST_RESOURCES_DIR=$(pwd)/MaaFramework/test/TestingDataSet/PipelineSmoking
            
            cd maa-framework-rs
            cargo test --verbose -- --test-threads=1
            cargo test --verbose --features dynamic -- --test-threads=1

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [aarch64]
      fail-fast: false

    steps:
      - name: Checkout self
        uses: actions/checkout@v4
        with:
            path: maa-framework-rs

      - name: Checkout MaaFramework
        uses: actions/checkout@v4
        with:
            repository: MaaXYZ/MaaFramework
            submodules: recursive
            path: MaaFramework

      - uses: maxim-lobanov/setup-xcode@v1
        with:
            xcode-version: 16.2

      - name: Install dep
        run: |
            brew install ninja ccache llvm
            echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
            remove_stale_cache: false

      - name: Setup Python
        uses: actions/setup-python@v5.2.0
        with:
            python-version: "3.9"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
            toolchain: stable
            target: aarch64-apple-darwin

      - name: Get latest MaaFramework release tag
        id: maa-version
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
            MAA_TAG=$(gh release list --repo MaaXYZ/MaaFramework \
              --exclude-drafts \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')
            echo "tag=$MAA_TAG" >> $GITHUB_OUTPUT
            echo "Using MaaFramework $MAA_TAG"

      - name: Download MaaFramework SDK from release
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
            TAG="${{ steps.maa-version.outputs.tag }}"
            mkdir -p asset sdk install

            ASSET_NAME=$(gh release view "$TAG" --repo MaaXYZ/MaaFramework --json assets \
              --jq '.assets[].name | select(((ascii_downcase | contains("mac")) or (ascii_downcase | contains("osx"))) and ((ascii_downcase | contains("arm64")) or (ascii_downcase | contains("aarch64"))))' \
              | head -n 1)

            test -n "$ASSET_NAME" || (echo "No macOS arm64 asset found for $TAG" && exit 1)

            gh release download "$TAG" --repo MaaXYZ/MaaFramework --pattern "$ASSET_NAME" --dir asset

            FILE=$(find asset -type f | head -n 1)
            case "$FILE" in
              *.zip) unzip -q "$FILE" -d sdk ;;
              *.tar.gz|*.tgz) tar -xzf "$FILE" -C sdk ;;
              *.tar.xz) tar -xJf "$FILE" -C sdk ;;
              *) echo "Unsupported asset: $FILE"; exit 1 ;;
            esac

            ROOT=$(find sdk -mindepth 1 -maxdepth 1 -type d | head -n 1)
            [ -n "$ROOT" ] || ROOT=sdk
            cp -R "$ROOT"/. install/

      - name: Download Plugin
        uses: robinraju/release-downloader@v1
        with:
            repository: MaaXYZ/MaaPluginDemo
            latest: true
            fileName: "*macos-${{ matrix.arch }}*"
            out-file-path: "download_plugins"
            extract: true
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Plugin
        shell: bash
        run: |
            cp -r download_plugins/bin install/bin/plugins

      - name: Run Rust testing
        shell: bash
        run: |
            export MAA_SDK_PATH=$(pwd)/install
            export MAA_TEST_RESOURCES_DIR=$(pwd)/MaaFramework/test/TestingDataSet/PipelineSmoking
            export DYLD_LIBRARY_PATH=$(pwd)/install/bin:$DYLD_LIBRARY_PATH
            export LD_LIBRARY_PATH=$(pwd)/install/bin:$LD_LIBRARY_PATH
            
            cd maa-framework-rs
            cargo test --verbose -- --test-threads=1
            cargo test --verbose --features dynamic -- --test-threads=1
